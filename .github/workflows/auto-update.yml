name: Auto-update NGINX Plus directives

# Runs every Sunday at 6am UTC. Can also be triggered manually.
on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually? (e.g., 'NGINX Plus R36 just dropped')"
        required: false
        default: "Manual check"

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check release notes for a new version
        id: check
        run: |
          python3 skills/nginx-plus-guide-updater/scripts/check-release-notes.py > /tmp/latest.json
          cat /tmp/latest.json
          echo "latest_version=$(jq -r .latest_version /tmp/latest.json)" >> "$GITHUB_OUTPUT"

      - name: Compare against last-seen version
        id: compare
        run: |
          LATEST="${{ steps.check.outputs.latest_version }}"
          LAST_SEEN=$(cat skills/nginx-plus-guide-updater/state/last-seen-version.txt | tr -d '[:space:]')
          echo "Latest: $LATEST"
          echo "Last seen: $LAST_SEEN"
          if [ "$LATEST" = "$LAST_SEEN" ]; then
            echo "No new version. Exiting clean."
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $LATEST"
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop early if no update needed
        if: steps.compare.outputs.needs_update == 'false'
        run: |
          echo "Nothing to do."
          exit 0

      # ──────────────────────────────────────────────────────────
      # The next step is where the Claude Code skill is invoked.
      # In the recommended setup, this calls Anthropic's claude-code-action.
      # See docs-meta/HOW-THE-AUTO-UPDATE-WORKS.md for the full pattern.
      # ──────────────────────────────────────────────────────────
      - name: Invoke the updater skill (Claude Code)
        if: steps.compare.outputs.needs_update == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Use the nginx-plus-guide-updater skill to process NGINX Plus release ${{ steps.check.outputs.latest_version }}.
            Follow the five-step workflow in skills/nginx-plus-guide-updater/SKILL.md.
            Open a pull request with the proposed changes.
          allowed_tools: "Bash,Read,Write,Edit,WebFetch"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_ROOT: ${{ github.workspace }}

      - name: Summary
        run: |
          echo "### Auto-update run complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- Latest version: ${{ steps.check.outputs.latest_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Update needed: ${{ steps.compare.outputs.needs_update }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
