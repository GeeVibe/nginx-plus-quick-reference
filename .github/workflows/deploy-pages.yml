name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Copy current release version into docs/
        run: |
          if [ -f skills/nginx-plus-guide-updater/state/last-seen-version.txt ]; then
            cp skills/nginx-plus-guide-updater/state/last-seen-version.txt docs/version.txt
            echo "Wrote docs/version.txt: $(cat docs/version.txt)"
          else
            echo "No state file found; skipping version stamp"
          fi

      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
